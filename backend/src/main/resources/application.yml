spring:
  datasource:
    url: jdbc:h2:mem:legendagaruda;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false

server:
  port: 8081

app:
  jwt:
    secret: "legenda-garuda-secret-key-minimum-256-bits-ganti-di-production-ya-harus-panjang"
    expiration-ms: 86400000

logging:
  level:
    id.legendagaruda: DEBUG
